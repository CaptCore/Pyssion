name: Build and Upload to internal PyPI server

on:
  release:
    types:
      - created

jobs:
  build-and-upload:
    # environment: build
    runs-on: self-hosted

    steps:
      # 1. GitHub checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. set build env
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build twine minio

      # 3. check target
      - name: Extract module name and version from tag
        id: parse_tag
        run: |
          TAG_NAME="${GITHUB_REF/tags/}"
          MODULE=$(echo "$TAG_NAME" | cut -d'/' -f1)
          VERSION=$(echo "$TAG_NAME" | cut -d'/' -f2)

          echo "Module: $MODULE"
          echo "Version: $VERSION"

          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 4. upload & build package

      # 4. finished alert